{% extends 'exam/base.html' %}
{% block content %}

<style>
.report-card {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    text-align: center;
}

.score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg,#6366f1,#a855f7);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    margin: 20px auto;
}

.stat-box {
    background: #f8fafc;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

</style>

<div class="container py-5">
    <div class="report-card">

        <h2>🎯 Exam Report</h2>
        <p class="text-muted">{{ result.exam.title }}</p>

        <div class="score-circle">
            {{ result.percentage }}%
        </div>

        <h4>Score: {{ result.score }} / {{ result.total }}</h4>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="stat-box">
                    ✅ Correct <br><b>{{ correct }}</b>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-box">
                    ❌ Wrong <br><b>{{ wrong }}</b>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-box">
                    ⏭ Skipped <br><b>{{ skipped }}</b>
                </div>
            </div>
        </div>

        <a href="{% url 'exam:select_exam' %}" class="btn btn-primary mt-4">
            Back to Dashboard
        </a>

    </div>
</div>

{% endblock %}
